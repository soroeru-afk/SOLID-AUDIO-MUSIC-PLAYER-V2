<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOLID AUDIO MUSIC PLAYER</title>
    <link rel="manifest" href="manifest.json?v=2.0.12" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="./icon.png?v=2.0.12" />
    <link rel="apple-touch-icon" href="./icon.png?v=2.0.12" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js?v=2.0.12').then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, (err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
